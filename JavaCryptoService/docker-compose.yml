services:
  crypto-java:
    build: .
    container_name: crypto-java-service
    ports:
      - "8080:8080"
    environment:
      KEYSTORE_PATH: /app/certs/keystore.p12
      KEYSTORE_PASSWORD: ${KEYSTORE_PASSWORD}
    volumes:
      - ./certs:/app/certs:ro
      - java-data:/app/data

volumes:
  java-data:
