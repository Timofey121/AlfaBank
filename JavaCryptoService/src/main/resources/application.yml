server:
  port: 8080

spring:
  application:
    name: crypto-service
  datasource:
    url: jdbc:h2:file:./data/cryptodb;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration

crypto:
  keystore:
    path: ${KEYSTORE_PATH:./certs/keystore.p12}
    password: ${KEYSTORE_PASSWORD}
    type: PKCS12

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
